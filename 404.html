<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
  (function(){
    var p = window.location.pathname;

    // 1. Spanish locale /es/X → English equivalent /X
    if (p.indexOf('/es/') === 0) {
      var english = p.replace(/^\/es/, '');
      if (english === '' || english === '/') english = '/';
      window.location.replace(english);
      return;
    }

    // 2. Old compare format without state codes: /compare/houston-vs-new-york/ → /compare/
    if (p.indexOf('/compare/') === 0 && p !== '/compare/') {
      // Try to keep the URL if it matches current format (city-st-vs-city-st)
      var slug = p.replace(/^\/compare\//, '').replace(/\/$/, '');
      if (slug.match(/-vs-/)) {
        // Already has -vs- format, just go to compare index
        window.location.replace('/compare/');
        return;
      }
    }

    // 3. Old safest-cities paths → /safest-cities/
    if (p.indexOf('/safest-cities/') === 0) {
      // Extract state slug and try redirect
      var state = p.replace(/^\/safest-cities\//, '').replace(/\/$/, '');
      if (state && state !== 'index.html') {
        window.location.replace('/safest-cities/' + state + '/');
        return;
      }
    }

    // 4. Bare /city/ or /city paths
    if (p === '/city' || p === '/city/') {
      window.location.replace('/');
      return;
    }

    // 5. City pages: /city/name-st/ → try to resolve
    var cityMatch = p.match(/^\/city\/([a-z0-9-]+)\/?$/);
    if (cityMatch) {
      var citySlug = cityMatch[1];
      // Redirect to same path (page may exist, could be caching issue)
      window.location.replace('/city/' + citySlug + '/');
      return;
    }

    // 6. Bare /zip/ path
    if (p === '/zip' || p === '/zip/') {
      window.location.replace('/');
      return;
    }

    // 7. Double-dash in any path
    if (p.indexOf('--') !== -1) {
      window.location.replace(p.replace(/--+/g, '-'));
      return;
    }
  })();
  </script>
  <title>Page Not Found | CrimeSafe</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    :root { --primary: #0d9488; --bg: #f8fafc; --text: #1e293b; --muted: #64748b; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    h1 { font-size: 6rem; color: var(--primary); margin-bottom: 1rem; }
    h2 { font-size: 1.5rem; margin-bottom: 1rem; }
    p { color: var(--muted); margin-bottom: 2rem; max-width: 400px; }
    a { color: var(--primary); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
    .links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .btn { background: var(--primary); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; }
    .btn:hover { background: #0f766e; text-decoration: none; }
  </style>
</head>
<body>
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>Sorry, the page you're looking for doesn't exist or has moved. Try searching for a city or ZIP code instead.</p>
  <div class="links">
    <a href="/" class="btn">Go Home</a>
    <a href="/safest-cities/">Safest Cities</a>
    <a href="/compare/">Compare Cities</a>
  </div>
<div id="cookie-consent" style="display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.85);color:#fff;padding:1rem;z-index:10000;font-size:0.9rem;text-align:center;">
We use cookies for analytics to improve your experience. By clicking Accept, you consent to our use of cookies.
<button onclick="acceptCookies()" style="margin-left:1rem;padding:0.4rem 1.2rem;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.85rem;">Accept</button>
<button onclick="declineCookies()" style="margin-left:0.5rem;padding:0.4rem 1.2rem;background:#666;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.85rem;">Decline</button>
</div>
<script>
function loadGA(){var s=document.createElement('script');s.src='https://www.googletagmanager.com/gtag/js?id=G-0G79LDD6JD';s.async=true;document.head.appendChild(s);s.onload=function(){window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-0G79LDD6JD');};}
function acceptCookies(){localStorage.setItem('crimesafe-consent','granted');document.getElementById('cookie-consent').style.display='none';loadGA();}
function declineCookies(){localStorage.setItem('crimesafe-consent','denied');document.getElementById('cookie-consent').style.display='none';}
(function(){var c=localStorage.getItem('crimesafe-consent');if(c==='granted'){loadGA();}else if(c!=='denied'){document.getElementById('cookie-consent').style.display='block';}})();
</script>
</body>
</html>
